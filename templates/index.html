<!DOCTYPE html>
<html>
<head>
    <title>Local LLM App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #1a1a2e;
            text-align: center;
        }
        p {
            text-align: center;
            color: #e85d26;
            font-weight: bold;
        }
        select, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        textarea {
            height: 150px;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #e85d26;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
        }
        button:hover {
            background-color: #1a1a2e;
        }
        .result {
            background-color: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 5px;
            border-left: 5px solid #e85d26;
            white-space: pre-wrap;
        }
        .result h2 {
            color: #1a1a2e;
        }
    </style>
</head>
<body>
    <h1>Local LLM Analyzer</h1>
    <p>Powered by Local AI — No Cloud — No Data Egress</p>

    <form method="POST">
        <label><b>Select Mode:</b></label>
        <select name="mode">
            <option value="healthcare">Healthcare — Patient Note Summarizer</option>
            <option value="finance">Finance — Earnings Report Analyzer</option>
        </select>

        <label><b>Enter Your Text:</b></label>
        <textarea name="text" placeholder="Type your text here..."></textarea>

        <button type="submit">Analyze</button>
    </form>

    {% if result %}
    <div class="result">
        <h2>AI Analysis:</h2>
        {{ result }}
    </div>
    {% endif %}

</body>
</html>
