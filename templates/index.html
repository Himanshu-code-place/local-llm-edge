<!DOCTYPE html>
<html>
<head>
    <title>Local LLM App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #1a1a2e;
            text-align: center;
        }
        .subtitle {
            text-align: center;
            color: #e85d26;
            font-weight: bold;
        }
        select, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }
        textarea {
            height: 150px;
        }
        .upload-box {
            border: 2px dashed #e85d26;
            border-radius: 5px;
            padding: 20px;
            text-align: center;
            margin: 10px 0;
            background-color: #fff;
        }
        .upload-box input {
            margin-top: 10px;
        }
        .or-divider {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #888;
            margin: 10px 0;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #e85d26;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: #1a1a2e;
        }
        .result {
            background-color: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 5px;
            border-left: 5px solid #e85d26;
            white-space: pre-wrap;
        }
        .result h2 {
            color: #1a1a2e;
        }
        .error {
            background-color: #ffe0e0;
            padding: 15px;
            margin-top: 20px;
            border-radius: 5px;
            border-left: 5px solid red;
            color: red;
        }
    </style>
</head>
<body>
    <h1>Local LLM Analyzer</h1>
    <p class="subtitle">Powered by Local AI — No Cloud — No Data Egress</p>

    <form method="POST" enctype="multipart/form-data">
        <label><b>Select Mode:</b></label>
        <select name="mode">
            <option value="healthcare">Healthcare — Patient Note Summarizer</option>
            <option value="finance">Finance — Earnings Report Analyzer</option>
        </select>

        <div class="upload-box">
            <b>📄 Upload PDF File</b><br>
            <small>Upload a PDF document to analyze</small><br>
            <input type="file" name="pdf_file" accept=".pdf">
        </div>

        <div class="or-divider">— OR —</div>

        <label><b>Type Your Text:</b></label>
        <textarea name="text" placeholder="Type your text here..."></textarea>

        <button type="submit">Analyze</button>
    </form>

    {% if error %}
    <div class="error">
        ❌ {{ error }}
    </div>
    {% endif %}

    {% if result %}
    <div class="result">
        <h2>AI Analysis:</h2>
        {{ result }}
    </div>
    {% endif %}

</body>
</html>
