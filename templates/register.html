<!DOCTYPE html>
<html lang="en">
<head>
    <title>Register — Local LLM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.12;
            z-index: 0;
        }
        .orb1 { width: 400px; height: 400px; background: #8b5cf6; top: -100px; left: -100px; }
        .orb2 { width: 300px; height: 300px; background: #ec4899; bottom: -50px; right: -50px; }

        .card {
            position: relative;
            z-index: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            backdrop-filter: blur(20px);
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.4);
            font-size: 13px;
            margin-bottom: 30px;
        }

        h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
            text-align: center;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            margin-top: 18px;
        }

        input {
            width: 100%;
            padding: 13px 16px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #ffffff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }

        input:focus {
            border-color: rgba(139,92,246,0.6);
            background: rgba(139,92,246,0.08);
        }

        input::placeholder { color: rgba(255,255,255,0.2); }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 24px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
            box-shadow: 0 8px 30px rgba(139,92,246,0.35);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(139,92,246,0.5);
        }

        .error {
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.3);
            padding: 12px 16px;
            border-radius: 10px;
            color: #f87171;
            font-size: 13px;
            margin-top: 16px;
            text-align: center;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: rgba(255,255,255,0.4);
        }

        .login-link a {
            color: #8b5cf6;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover { text-decoration: underline; }

        .info {
            background: rgba(139,92,246,0.08);
            border: 1px solid rgba(139,92,246,0.2);
            padding: 12px 16px;
            border-radius: 10px;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            margin-top: 16px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="orb orb1"></div>
    <div class="orb orb2"></div>

    <div class="card">
        <div class="logo">⚡ Local LLM Analyzer</div>
        <div class="subtitle">Zero Cloud · 100% Private</div>

        <h2>Create Account 🚀</h2>

        <form method="POST">
            <label>Username</label>
            <input type="text" name="username" placeholder="Choose a username" required>

            <label>Password</label>
            <input type="password" name="password" placeholder="Choose a password" required>

            <button type="submit">Create Account →</button>
        </form>

        {% if error %}
        <div class="error">❌ {{ error }}</div>
        {% endif %}

        <div class="info">
            🔒 Your data is stored locally — never sent to any server
        </div>

        <div class="login-link">
            Already have account? <a href="/login">Login here</a>
        </div>
    </div>

</body>
</html>
